x-frontend-base: &frontend-base
  image: sashecka-frontend-dev:local
  build:
    context: ./frontend
    dockerfile: Dockerfile.dev
  working_dir: /workspace/frontend
  user: "${UID:-1000}:${GID:-1000}" # 1000:1000 is the default user and group id for the local user, it's need to not start container as root and save vite cache as root that crash npm run dev
  env_file:
    - ./frontend/.env
  environment:
    CHOKIDAR_USEPOLLING: "true"
  volumes:
    - ./frontend:/workspace/frontend
    - frontend-node-modules:/workspace/frontend/node_modules

services:
  backend:
    image: sashecka-backend:local
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite:///./app-compose.db
    working_dir: /app
    command: sh -c '/app/.venv/bin/uvicorn app.main:app --host "$$HOST" --port "$$PORT" --reload'
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - backend-venv:/app/.venv

  auth-remote:
    <<: *frontend-base
    command: npm run dev --workspace @sashecka/auth-remote -- --host 0.0.0.0
    ports:
      - "4174:4174"

  react-app-remote:
    <<: *frontend-base
    command: npm run dev --workspace @sashecka/react-app-remote -- --host 0.0.0.0
    ports:
      - "4175:4175"

  profile-vue-remote:
    <<: *frontend-base
    command: npm run dev --workspace @sashecka/profile-vue-remote -- --host 0.0.0.0
    ports:
      - "4176:4176"

  shell:
    <<: *frontend-base
    command: npm run dev --workspace @sashecka/shell -- --host 0.0.0.0
    depends_on:
      - backend
      - auth-remote
      - react-app-remote
      - profile-vue-remote
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: /api/v1
      VITE_SHELL_ORIGIN: http://localhost:4183
      VITE_BACKEND_ORIGIN: http://backend:8000
    ports:
      - "4183:4173"

volumes:
  backend-venv:
  frontend-node-modules:
